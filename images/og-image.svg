<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a7a4a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f1f14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1f14"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo dot + SmartFeed -->
  <circle cx="502" cy="175" r="7" fill="#24a866"/>
  <text x="520" y="185" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="32" fill="#ffffff" letter-spacing="0.5">SmartFeed</text>

  <!-- Main headline line 1 -->
  <text x="600" y="320" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Eat well.</text>

  <!-- Main headline line 2 -->
  <text x="600" y="405" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="#24a866" text-anchor="middle" letter-spacing="-1">No matter your zip code.</text>

  <!-- Subtle bottom line -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#5a6e60" text-anchor="middle" letter-spacing="2">POWERED BY USDA DATA &amp; AI</text>
</svg>
